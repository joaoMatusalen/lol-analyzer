<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - League Analyzer</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>

    <header class="header">
        <h1>📊 Player Dashboard</h1>
        <p id="player-info"></p>
    </header>

    <section class="kpi-container">
        <div class="kpi">
            <h3>Win Rate</h3>
            <p id="winrate"></p>
        </div>

        <div class="kpi">
            <h3>KDA</h3>
            <p id="kda"></p>
        </div>

        <div class="kpi">
            <h3>Total Games</h3>
            <p id="total-games"></p>
        </div>

        <div class="kpi">
            <h3>Total Gold</h3>
            <p id="gold"></p>
        </div>
    </section>

    <section class="charts">
        <div class="chart-box">
            <canvas id="winChart"></canvas>
        </div>

        <div class="chart-box">
            <canvas id="farmChart"></canvas>
        </div>

        <div class="chart-box">
            <canvas id="visionChart"></canvas>
        </div>
    </section>

    <script src="../static/js/dashboard.js"></script>
</body>
</html>
